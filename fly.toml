# Fly.io deploy config for RNG Ops
#
# One-command deploy (from a machine with the Fly CLI installed and `fly auth login` done):
#
#     fly launch --copy-config --name rng-ops --region ord --now
#
# Or, if the app already exists:
#
#     fly deploy
#
# The [mounts] block persists the SQLite database across deploys and restarts.

app = "rng-ops"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  DATABASE_PATH = "/data/data.db"

[[mounts]]
  source = "rng_ops_data"
  destination = "/data"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
